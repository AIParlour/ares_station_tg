<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Ares Station glyph: chevron A + Paradox eye -->

  <!-- Left leg of the A -->
  <line x1="10" y1="56" x2="32" y2="8" stroke="currentColor" stroke-width="3.5" stroke-linecap="square"/>

  <!-- Right leg of the A -->
  <line x1="54" y1="56" x2="32" y2="8" stroke="currentColor" stroke-width="3.5" stroke-linecap="square"/>

  <!-- Crossbar -->
  <line x1="17.5" y1="40" x2="46.5" y2="40" stroke="currentColor" stroke-width="3.5" stroke-linecap="square"/>

  <!-- Paradox eye — filled circle -->
  <circle cx="32" cy="28" r="4.5" fill="currentColor"/>
</svg>
